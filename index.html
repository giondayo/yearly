<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Phenology">
<meta name="theme-color" content="#4A7C3F">
<title>Yearly</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;-webkit-text-size-adjust:100%;}
body{
  font-family:Georgia,'Palatino Linotype',Palatino,'Book Antiqua',serif;
  background:#EDE8DC;
  color:#1a1208;
  overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;}

/* Header */
#hdr{
  flex-shrink:0;
  padding:14px 16px 10px;
  background:#EDE8DC;
  border-bottom:1px solid #c8b888;
}
#hdr h1{font-size:20px;font-weight:normal;letter-spacing:0.04em;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;}
#hdr .sub{font-size:11px;color:#8a7050;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:Georgia,'Palatino Linotype',Palatino,serif;letter-spacing:0.02em;}

/* Scrollable body */
#body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#leg{
  display:flex;flex-wrap:wrap;gap:6px 16px;
  padding:8px 16px 4px;
}
.leg-i{display:flex;align-items:center;gap:5px;font-size:11px;font-family:monospace;color:#7a6240;}
.leg-d{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* Grid */
#gwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
#grid{display:inline-flex;flex-direction:column;padding:0 16px 20px;}

.mrow{display:flex;}
.mlbl{
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:#8a7050;font-family:monospace;
  border-bottom:1px solid #c0a870;padding-bottom:4px;margin-top:8px;
}

.phrow{display:flex;border-bottom:1px solid #ddd0b0;}
.phrow:nth-child(even){background:rgba(0,0,0,.018);}
.phrow.dragging{opacity:0.4;}
.phrow.drag-above{box-shadow:0 -2px 0 #4A7C3F;}
.phrow.drag-below{box-shadow:0 2px 0 #4A7C3F;}

.labl{display:flex;align-items:center;flex-shrink:0;padding-right:6px;}
.resizer{
  font-family:monospace;font-size:11px;letter-spacing:-1px;
  color:#c8aa68;cursor:col-resize;padding:2px 4px;border-radius:4px;
  user-select:none;-webkit-user-select:none;flex-shrink:0;
  transition:color .15s,background .15s;
}
.resizer:hover,.resizer.active{color:#7a5010;background:rgba(160,120,50,.14);}
.dragger{
  flex-shrink:0;width:10px;align-self:stretch;cursor:grab;
  border-radius:2px;margin-left:1px;
  background-image:radial-gradient(circle,#b09060 1px,transparent 1px);
  background-size:3px 3.5px;background-position:center;
  background-clip:content-box;padding:7px 0;
  opacity:0.38;transition:opacity .15s;
}
.dragger:hover{opacity:0.75;}
.dragger:active{cursor:grabbing;}

/* Group headers */
.ghdr{
  display:flex;align-items:stretch;
  padding:4px 0 3px;
  border-bottom:1.5px solid #c0a870;
  background:#EDE8DC;
}
.ghdr.dragging{opacity:0.4;}
.ghdr.drag-above{box-shadow:0 -2px 0 #4A7C3F;}
.ghdr.drag-below{box-shadow:0 2px 0 #4A7C3F;}
.ghdr-grip{
  flex-shrink:0;width:10px;align-self:stretch;cursor:grab;
  border-radius:2px;margin-right:2px;
  background-image:radial-gradient(circle,#b09060 1px,transparent 1px);
  background-size:3px 3.5px;background-position:center;
  background-clip:content-box;padding:5px 0;
  opacity:0.35;transition:opacity .15s;
}
.ghdr-grip:hover{opacity:0.7;}
.ghdr-grip:active{cursor:grabbing;}
.ghdr-toggle{
  font-size:9px;color:#9a8060;cursor:pointer;padding:4px 5px;
  flex-shrink:0;user-select:none;-webkit-user-select:none;
  display:flex;align-items:center;
}
.ghdr-name{
  font-size:10px;font-weight:normal;letter-spacing:.18em;text-transform:uppercase;
  font-family:Georgia,'Palatino Linotype',Palatino,serif;
  color:#7a6040;cursor:pointer;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  -webkit-tap-highlight-color:rgba(0,0,0,.05);
  display:flex;align-items:center;
}
.ghdr-name:active{opacity:.6;}
.ghdr-merge{
  background:none;border:none;color:#c8aa68;font-size:13px;line-height:1;
  cursor:pointer;padding:4px 3px;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;
}
.ghdr-del{
  background:none;border:none;color:#bfaa80;font-size:16px;line-height:1;
  cursor:pointer;padding:4px 4px;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;
}
.ghdr.drag-on{background:rgba(74,124,63,.1);}

.lname{
  font-size:13px;line-height:1.3;cursor:pointer;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  -webkit-tap-highlight-color:rgba(0,0,0,.06);
  font-style:italic;letter-spacing:0.01em;
}
.lname:active{opacity:.55;}
.xbtn{
  background:none;border:none;color:#bfaa80;font-size:19px;
  cursor:pointer;padding:8px 4px;flex-shrink:0;line-height:1;
  -webkit-tap-highlight-color:transparent;
}

.lanes{display:flex;flex-direction:column;justify-content:center;}
.lane{display:flex;align-items:center;}
.ylbl{font-family:monospace;font-size:10px;font-weight:700;letter-spacing:.03em;flex-shrink:0;}

.wcell{
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  position:relative;
}
.wcell:active{background:rgba(0,0,0,.07);}
.wdot{border-radius:50%;pointer-events:none;}

/* Footer */
#ftr{
  flex-shrink:0;display:flex;flex-wrap:wrap;gap:8px;
  padding:10px 16px max(10px,env(safe-area-inset-bottom)) 16px;
  border-top:1px solid #c8b888;background:#EDE8DC;
}
.fbtn{
  background:none;border:1.5px dashed #b0a078;border-radius:20px;
  color:#6a5a30;font-size:13px;padding:7px 14px;cursor:pointer;
  font-family:Georgia,'Palatino Linotype',Palatino,serif;
  letter-spacing:0.02em;
  -webkit-tap-highlight-color:transparent;
}
.fbtn:active{background:rgba(0,0,0,.06);}

/* Bottom sheet modal */
.modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);z-index:300;
  align-items:flex-end;justify-content:center;
}
.modal.open{display:flex;}
.sheet{
  background:#EDE8DC;border-radius:20px 20px 0 0;
  width:100%;max-width:520px;
  padding:22px 20px max(22px,env(safe-area-inset-bottom)) 20px;
}
.stitle{font-size:17px;font-weight:normal;font-style:italic;letter-spacing:0.02em;margin-bottom:14px;}
.sinput{
  width:100%;font-size:16px;padding:12px 13px;
  border:1.5px solid #c0a870;border-radius:10px;
  background:#F8F3E8;outline:none;
  font-family:Georgia,'Palatino Linotype',Palatino,serif;
  color:#1a1208;-webkit-appearance:none;margin-bottom:14px;
}
.sinput:focus{border-color:#4A7C3F;}
textarea.sinput{font-size:12px;font-family:monospace;height:90px;resize:none;font-style:normal;}
.sbtns{display:flex;gap:10px;}
.sb{
  flex:1;padding:13px;border-radius:10px;
  font-size:15px;font-weight:600;cursor:pointer;border:none;
  -webkit-tap-highlight-color:transparent;
}
.sb-c{background:#dfd7c0;color:#5a4a2a;}
.sb-o{background:#4A7C3F;color:#fff;}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <div style="min-width:0;">
        <h1>Phenology Record</h1>
        <div class="sub">Tap a week to mark · tap a name to rename · × to delete a row</div>
      </div>
      <div style="display:flex;align-items:center;gap:7px;flex-shrink:0;">
        <span style="font-size:11px;color:#8a7050;white-space:nowrap;">Row height</span>
        <input type="range" id="rh-slider" min="0" max="30" value="16" step="1"
          style="width:72px;accent-color:#4A7C3F;">
      </div>
    </div>
  </div>

  <div id="body">
    <div id="leg"></div>
    <div id="gwrap"><div id="grid"></div></div>
  </div>

  <div id="ftr">
    <button class="fbtn" id="btn-row">+ Row</button>
    <button class="fbtn" id="btn-grp">+ Group</button>
    <button class="fbtn" id="btn-year">+ Year</button>
    <button class="fbtn" id="btn-bak">Backup / Restore</button>
  </div>
</div>

<!-- Rename modal -->
<div class="modal" id="m-edit">
  <div class="sheet">
    <div class="stitle" id="m-edit-title">Rename observation</div>
    <input class="sinput" type="text" id="ei" autocomplete="off" spellcheck="false">
    <div class="sbtns">
      <button class="sb sb-c" id="ec">Cancel</button>
      <button class="sb sb-o" id="eo">Save</button>
    </div>
  </div>
</div>

<!-- Merge modal -->
<div class="modal" id="m-merge">
  <div class="sheet">
    <div class="stitle" id="m-merge-title">Merge group</div>
    <p style="font-size:12px;color:#8a7050;margin-bottom:10px;">Choose target:</p>
    <div id="m-merge-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;"></div>
    <div class="sbtns">
      <button class="sb sb-c" id="m-merge-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Backup modal -->
<div class="modal" id="m-bak">
  <div class="sheet">
    <div class="stitle">Backup & Restore</div>
    <p style="font-size:12px;color:#8a7050;margin-bottom:6px;">Your data (copy to save somewhere):</p>
    <textarea class="sinput" id="bo" readonly></textarea>
    <p style="font-size:12px;color:#8a7050;margin:8px 0 6px;">Paste a previous backup to restore:</p>
    <textarea class="sinput" id="bi" placeholder="Paste backup here…" style="height:72px"></textarea>
    <div class="sbtns">
      <button class="sb sb-c" id="bc">Close</button>
      <button class="sb sb-o" id="bim">Import</button>
    </div>
  </div>
</div>

<script>
"use strict";

// ── Constants ─────────────────────────────────────────────
const CW=16, YLW=44; let LW=150;
let sliderN=16;
const MONTHS=[
  {n:"Jan",s:1},{n:"Feb",s:5},{n:"Mar",s:9},{n:"Apr",s:14},
  {n:"May",s:18},{n:"Jun",s:22},{n:"Jul",s:27},{n:"Aug",s:31},
  {n:"Sep",s:36},{n:"Oct",s:40},{n:"Nov",s:44},{n:"Dec",s:49}
];
const COLORS=["#1D9E75","#BA7517","#378ADD","#D4537E","#7F77DD","#639922","#D85A30","#888780"];
const TY=new Date().getFullYear();

// ── State ─────────────────────────────────────────────────
const DEF={
  rows:[
    {id:1,name:"Lumet sulaneet",groupId:2},
    {id:2,name:"Jäät lähteneet",groupId:2},
    {id:3,name:"Koivussa lehtiä",groupId:4},
    {id:4,name:"Eka perhonen",groupId:4},
    {id:5,name:"Eka kärpänen",groupId:4},
    {id:6,name:"Vuohenputkisato alkaa",groupId:3},
    {id:7,name:"Teepaitakeli",groupId:2},
    {id:8,name:"Joutsenet saapuvat",groupId:1},
    {id:9,name:"Kurjet saapuvat",groupId:1},
    {id:10,name:"Mustarastaat laulavat",groupId:1}
  ],
  groups:[
    {id:1,name:"Linnut",collapsed:false},
    {id:2,name:"Sää",collapsed:false},
    {id:3,name:"Sadonkorjuu",collapsed:false},
    {id:4,name:"Elämä",collapsed:false}
  ],
  years:[TY],obs:{},nextId:11,nextGroupId:5
};
let S;

function load(){
  try{const d=localStorage.getItem("pheno");S=d?JSON.parse(d):JSON.parse(JSON.stringify(DEF));}
  catch(e){S=JSON.parse(JSON.stringify(DEF));}
  // Migration: ensure groups exist
  if(!S.groups) S.groups=[];
  if(!S.nextGroupId) S.nextGroupId=(S.groups.length?Math.max(...S.groups.map(g=>g.id))+1:1);
  S.rows.forEach(r=>{if(r.groupId===undefined) r.groupId=null;});
}
function save(){try{localStorage.setItem("pheno",JSON.stringify(S));}catch(e){}}

function isoWeek(){
  const d=new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  const w=new Date(d.getFullYear(),0,4);
  return 1+Math.round(((d-w)/864e5-3+(w.getDay()+6)%7)/7);
}

// ── Render ────────────────────────────────────────────────
function render(){
  renderLegend();
  const gw=document.getElementById("gwrap");
  const sx=gw.scrollLeft;
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  const phrowH=16*S.years.length+sliderN;
  const laneH=phrowH/S.years.length;
  const tyIdx=S.years.indexOf(TY);
  const todayBg=hexRgba(COLORS[tyIdx>=0?tyIdx%COLORS.length:0],0.14);
  const pw0=LW+YLW;
  const nowWeek=isoWeek();
  const ptodayX=pw0+(nowWeek-1)*CW;

  // Month header row
  const mrow=el("div","mrow");
  mrow.style.alignItems="flex-end";
  const mlabl=el("div");
  mlabl.style.cssText=`width:${LW}px;flex-shrink:0;display:flex;justify-content:flex-end;align-items:flex-end;border-bottom:1px solid #c0a870;padding-bottom:4px;margin-top:8px;`;
  const rz=el("div","resizer");
  rz.textContent="⇔";
  rz.addEventListener("mousedown",startResize);
  rz.addEventListener("touchstart",startResizeTouch,{passive:false});
  mlabl.appendChild(rz);
  mrow.appendChild(mlabl);
  const myl=el("div");
  myl.style.cssText=`width:${YLW}px;flex-shrink:0;`;
  mrow.appendChild(myl);
  MONTHS.forEach((m,i)=>{
    const nxt=MONTHS[i+1]?.s||53;
    const e=el("div","mlbl");
    e.style.width=((nxt-m.s)*CW)+"px";
    e.textContent=m.n;
    mrow.appendChild(e);
  });
  grid.appendChild(mrow);

  // Week row + all rows inside stripewrap
  const wrow=el("div","mrow");
  wrow.style.marginLeft=(LW+YLW)+"px";
  for(let w=1;w<=52;w++){
    const wc=el("div");
    wc.style.cssText=`width:${CW}px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:monospace;color:#b0a080;writing-mode:vertical-rl;transform:rotate(180deg);`;
    wc.textContent=w;
    wrow.appendChild(wc);
  }

  const stripewrap=el("div");
  stripewrap.style.backgroundImage=`linear-gradient(${todayBg},${todayBg}),linear-gradient(90deg,#EDE8DC ${pw0}px,transparent ${pw0}px),repeating-linear-gradient(90deg,transparent,transparent ${CW}px,rgba(0,0,0,0.04) ${CW}px,rgba(0,0,0,0.04) ${CW*2}px)`;
  stripewrap.style.backgroundSize=`${CW}px 100%,100% 100%,${CW*2}px 100%`;
  stripewrap.style.backgroundPosition=`${ptodayX}px 0,0 0,${pw0}px 0`;
  stripewrap.style.backgroundRepeat=`no-repeat,no-repeat,repeat-x`;
  stripewrap.appendChild(wrow);

  const phrwrap=el("div");

  function buildPhrow(row){
    const ro=S.obs[row.id]||{};
    const phrow=el("div","phrow");
    phrow.dataset.rowId=row.id;
    phrow.style.height=phrowH+"px";
    phrow.style.overflow="hidden";

    const la=el("div","labl");
    la.style.cssText=`width:${LW}px;padding-right:8px;`;
    const ln=el("div","lname");
    ln.textContent=row.name;
    ln.addEventListener("click",()=>openEdit('row',row.id,row.name));
    const xb=el("button","xbtn");
    xb.textContent="×";
    xb.addEventListener("click",()=>{
      if(confirm(`Remove "${row.name}"?`)){
        S.rows=S.rows.filter(r=>r.id!==row.id);
        delete S.obs[row.id];
        save();render();
      }
    });
    const dh=el("div","dragger");
    dh.addEventListener("mousedown",(e)=>startDragRow(e,row.id));
    dh.addEventListener("touchstart",(e)=>startDragRow(e,row.id),{passive:false});
    la.appendChild(ln);la.appendChild(xb);la.appendChild(dh);
    phrow.appendChild(la);

    const lanes=el("div","lanes");
    S.years.forEach((year,yi)=>{
      const marked=ro[year];
      const color=COLORS[yi%COLORS.length];
      const lane=el("div","lane");
      lane.style.height=laneH+"px";
      const yl=el("div","ylbl");
      yl.style.cssText=`width:${YLW}px;color:${color};`;
      yl.textContent=year;
      lane.appendChild(yl);
      for(let w=1;w<=52;w++){
        const cell=el("div","wcell");
        cell.style.cssText=`width:${CW}px;height:${laneH}px;`;
        if(marked===w){
          const dot=el("div","wdot");
          dot.style.cssText=`width:11px;height:11px;background:${color};`;
          cell.appendChild(dot);
        }
        cell.addEventListener("click",()=>{
          const gw2=document.getElementById("gwrap");
          const sx2=gw2.scrollLeft;
          const ro2=S.obs[row.id]||{};
          if(ro2[year]===w) delete ro2[year]; else ro2[year]=w;
          S.obs[row.id]=ro2;
          save();render();
          requestAnimationFrame(()=>{ gw2.scrollLeft=sx2; });
        });
        lane.appendChild(cell);
      }
      lanes.appendChild(lane);
    });
    phrow.appendChild(lanes);
    return phrow;
  }

  function buildGhdr(grp){
    const ghdr=el("div","ghdr");
    ghdr.dataset.gid=grp.id;

    const left=el("div");
    left.style.cssText=`width:${LW}px;flex-shrink:0;display:flex;align-items:center;min-width:0;overflow:hidden;`;

    const grip=el("div","ghdr-grip");
    grip.addEventListener("mousedown",(e)=>startDragGroup(e,grp.id));
    grip.addEventListener("touchstart",(e)=>startDragGroup(e,grp.id),{passive:false});

    const tog=el("span","ghdr-toggle");
    tog.textContent=grp.collapsed?"▸":"▾";
    tog.addEventListener("click",()=>toggleGroup(grp.id));

    const nm=el("span","ghdr-name");
    nm.textContent=grp.name;
    nm.addEventListener("click",()=>openEdit('group',grp.id,grp.name));

    const mrg=el("button","ghdr-merge");
    mrg.textContent="⇄";
    mrg.title="Yhdistä toiseen ryhmään";
    mrg.addEventListener("click",(e)=>{e.stopPropagation();openMerge(grp.id);});

    const del=el("button","ghdr-del");
    del.textContent="×";
    del.addEventListener("click",(e)=>{
      e.stopPropagation();
      if(confirm(`Poista ryhmä "${grp.name}"? Rivit siirretään ryhmättömiin.`)){
        deleteGroup(grp.id);
      }
    });

    left.appendChild(grip);left.appendChild(tog);left.appendChild(nm);
    left.appendChild(mrg);left.appendChild(del);
    ghdr.appendChild(left);

    const right=el("div");
    right.style.cssText=`flex:1;`;
    ghdr.appendChild(right);

    return ghdr;
  }

  // Render groups
  const groups=S.groups||[];
  const groupIds=new Set(groups.map(g=>g.id));

  groups.forEach((grp)=>{
    phrwrap.appendChild(buildGhdr(grp));
    if(!grp.collapsed){
      S.rows.filter(r=>r.groupId===grp.id).forEach(row=>{
        phrwrap.appendChild(buildPhrow(row));
      });
    }
  });

  // Ungrouped rows
  const ungrouped=S.rows.filter(r=>!r.groupId||!groupIds.has(r.groupId));
  ungrouped.forEach(row=>{
    phrwrap.appendChild(buildPhrow(row));
  });

  stripewrap.appendChild(phrwrap);
  grid.appendChild(stripewrap);
  requestAnimationFrame(()=>{ gw.scrollLeft=sx; });
}

function renderLegend(){
  const leg=document.getElementById("leg");
  leg.innerHTML="";
  S.years.forEach((y,i)=>{
    const d=el("div","leg-i");
    const dot=el("div","leg-d");
    dot.style.background=COLORS[i%COLORS.length];
    d.appendChild(dot);
    d.appendChild(document.createTextNode(y));
    const xb=el("button","xbtn");
    xb.textContent="×";
    xb.style.cssText="font-size:14px;padding:0 2px;color:#bfaa80;";
    xb.addEventListener("click",()=>{
      if(S.years.length<=1){alert("At least one year is required.");return;}
      if(confirm(`Remove ${y} and all its observations?`)){
        S.years=S.years.filter(yr=>yr!==y);
        Object.keys(S.obs).forEach(id=>{delete S.obs[id][y];});
        save();render();
      }
    });
    d.appendChild(xb);
    leg.appendChild(d);
  });
}

function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function hexRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

// ── Edit modal ────────────────────────────────────────────
let editId=null,editType='row';
function openEdit(type,id,name){
  editId=id;editType=type;
  const inp=document.getElementById("ei");
  inp.value=name;
  document.getElementById("m-edit-title").textContent=type==='group'?"Nimeä ryhmä":"Nimeä havainto";
  document.getElementById("m-edit").classList.add("open");
  setTimeout(()=>{inp.focus();inp.select();},80);
}
function closeEdit(){document.getElementById("m-edit").classList.remove("open");editId=null;}
function commitEdit(){
  const n=document.getElementById("ei").value.trim();
  if(n&&editId!==null){
    if(editType==='group'){
      S.groups=S.groups.map(g=>g.id===editId?{...g,name:n}:g);
    } else {
      S.rows=S.rows.map(r=>r.id===editId?{...r,name:n}:r);
    }
    save();render();
  }
  closeEdit();
}
document.getElementById("ec").addEventListener("click",closeEdit);
document.getElementById("eo").addEventListener("click",commitEdit);
document.getElementById("ei").addEventListener("keydown",e=>{
  if(e.key==="Enter")commitEdit();
  if(e.key==="Escape")closeEdit();
});

// ── Group functions ───────────────────────────────────────
function createGroup(){
  if(!S.groups) S.groups=[];
  const id=S.nextGroupId++;
  S.groups.push({id,name:"Uusi ryhmä",collapsed:false});
  save();render();
  openEdit('group',id,"Uusi ryhmä");
}

function toggleGroup(id){
  S.groups=S.groups.map(g=>g.id===id?{...g,collapsed:!g.collapsed}:g);
  save();render();
}

function deleteGroup(id){
  S.rows=S.rows.map(r=>r.groupId===id?{...r,groupId:null}:r);
  S.groups=S.groups.filter(g=>g.id!==id);
  save();render();
}

let _mergeSourceId=null;
function openMerge(id){
  _mergeSourceId=id;
  const src=S.groups.find(g=>g.id===id);
  document.getElementById("m-merge-title").textContent=`Yhdistä "${src?.name||''}"`;
  const list=document.getElementById("m-merge-list");
  list.innerHTML="";
  S.groups.filter(g=>g.id!==id).forEach(g=>{
    const btn=document.createElement("button");
    btn.className="sb sb-c";
    btn.style.cssText="text-align:left;padding:10px 14px;";
    btn.textContent=`→ ${g.name}`;
    btn.addEventListener("click",()=>commitMerge(g.id));
    list.appendChild(btn);
  });
  document.getElementById("m-merge").classList.add("open");
}

function commitMerge(targetId){
  if(_mergeSourceId===null) return;
  S.rows=S.rows.map(r=>r.groupId===_mergeSourceId?{...r,groupId:targetId}:r);
  S.groups=S.groups.filter(g=>g.id!==_mergeSourceId);
  _mergeSourceId=null;
  document.getElementById("m-merge").classList.remove("open");
  save();render();
}

document.getElementById("m-merge-cancel").addEventListener("click",()=>{
  _mergeSourceId=null;
  document.getElementById("m-merge").classList.remove("open");
});

// ── Footer ────────────────────────────────────────────────
document.getElementById("btn-row").addEventListener("click",()=>{
  const id=S.nextId++;
  S.rows.push({id,name:"New observation",groupId:null});
  save();render();
  openEdit('row',id,"New observation");
});
document.getElementById("btn-grp").addEventListener("click",createGroup);
document.getElementById("btn-year").addEventListener("click",()=>{
  S.years.push(Math.max(...S.years)+1);
  save();render();
});

// ── Backup ────────────────────────────────────────────────
document.getElementById("btn-bak").addEventListener("click",()=>{
  document.getElementById("bo").value=JSON.stringify(S);
  document.getElementById("bi").value="";
  document.getElementById("m-bak").classList.add("open");
});
document.getElementById("bc").addEventListener("click",()=>{
  document.getElementById("m-bak").classList.remove("open");
});
document.getElementById("bim").addEventListener("click",()=>{
  const t=document.getElementById("bi").value.trim();
  if(!t)return;
  try{
    const imp=JSON.parse(t);
    if(!imp.rows||!imp.years){alert("Invalid backup.");return;}
    S=imp;save();render();
    document.getElementById("m-bak").classList.remove("open");
    alert("Restored!");
  }catch(e){alert("Could not read backup text.");}
});

// ── PWA manifest + icon (generated at runtime) ───────────
(function(){
  function makeIcon(sz){
    const c=document.createElement("canvas");
    c.width=c.height=sz;
    const ctx=c.getContext("2d");
    const r=sz*0.2;
    ctx.fillStyle="#4A7C3F";
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.lineTo(sz-r,0);
    ctx.arcTo(sz,0,sz,r,r);ctx.lineTo(sz,sz-r);
    ctx.arcTo(sz,sz,sz-r,sz,r);ctx.lineTo(r,sz);
    ctx.arcTo(0,sz,0,sz-r,r);ctx.lineTo(0,r);
    ctx.arcTo(0,0,r,0,r);ctx.closePath();ctx.fill();
    const dots=[[.28,.38],[.50,.33],[.66,.44],[.38,.62],[.58,.64]];
    ctx.fillStyle="rgba(255,255,255,.88)";
    dots.forEach(([x,y])=>{
      ctx.beginPath();ctx.arc(sz*x,sz*y,sz*.065,0,Math.PI*2);ctx.fill();
    });
    return c.toDataURL("image/png");
  }
  const i192=makeIcon(192),i512=makeIcon(512);
  const mfst=JSON.stringify({
    name:"Phenology Record",short_name:"Phenology",
    description:"Track seasonal observations year by year",
    start_url:"./",display:"standalone",
    background_color:"#EDE8DC",theme_color:"#4A7C3F",orientation:"any",
    icons:[{src:i192,sizes:"192x192",type:"image/png"},{src:i512,sizes:"512x512",type:"image/png"}]
  });
  const blob=new Blob([mfst],{type:"application/manifest+json"});
  const link=document.createElement("link");
  link.rel="manifest";link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);
  const atl=document.createElement("link");
  atl.rel="apple-touch-icon";atl.href=i192;
  document.head.appendChild(atl);
})();

// ── Row drag reorder ──────────────────────────────────────
let _drgId=null,_drgRowTgt=null;
function startDragRow(e,id){
  _drgId=id;
  document.addEventListener("mousemove",moveDragRow);
  document.addEventListener("mouseup",endDragRow);
  document.addEventListener("touchmove",moveDragRowT,{passive:false});
  document.addEventListener("touchend",endDragRow);
  document.querySelectorAll(".phrow").forEach(r=>{
    if(parseInt(r.dataset.rowId)===id) r.classList.add("dragging");
  });
  e.preventDefault();
}
function moveDragRow(e){_updateRowDrag(e.clientY);}
function moveDragRowT(e){_updateRowDrag(e.touches[0].clientY);e.preventDefault();}
function _updateRowDrag(cy){
  const items=[...document.querySelectorAll(".phrow,.ghdr")];
  document.querySelectorAll(".phrow").forEach(r=>r.classList.remove("drag-above","drag-below"));
  document.querySelectorAll(".ghdr").forEach(g=>g.classList.remove("drag-on"));
  let tgtEl=null,tgtPos='below';
  for(let i=0;i<items.length;i++){
    const r=items[i].getBoundingClientRect();
    if(cy<r.top+r.height/2){tgtEl=items[i];tgtPos='above';break;}
    tgtEl=items[i];tgtPos='below';
  }
  _drgRowTgt={el:tgtEl,pos:tgtPos};
  if(tgtEl?.classList.contains("ghdr")){
    tgtEl.classList.add("drag-on");
  } else if(tgtEl?.classList.contains("phrow")){
    tgtEl.classList.add(tgtPos==='above'?"drag-above":"drag-below");
  }
}
function endDragRow(){
  document.removeEventListener("mousemove",moveDragRow);
  document.removeEventListener("mouseup",endDragRow);
  document.removeEventListener("touchmove",moveDragRowT);
  document.removeEventListener("touchend",endDragRow);
  document.querySelectorAll(".phrow,.ghdr").forEach(e=>
    e.classList.remove("dragging","drag-above","drag-below","drag-on")
  );
  if(_drgId!==null && _drgRowTgt){
    const {el,pos}=_drgRowTgt;
    const fromIdx=S.rows.findIndex(r=>r.id===_drgId);
    if(fromIdx!==-1){
      if(el?.classList.contains("ghdr")){
        const gid=parseInt(el.dataset.gid);
        const [row]=S.rows.splice(fromIdx,1);
        row.groupId=gid;
        let insertAt=S.rows.length;
        for(let i=S.rows.length-1;i>=0;i--){
          if(S.rows[i].groupId===gid){insertAt=i+1;break;}
        }
        S.rows.splice(insertAt,0,row);
        save();
      } else if(el?.classList.contains("phrow")){
        const tgtId=parseInt(el.dataset.rowId);
        if(tgtId!==_drgId){
          const [row]=S.rows.splice(fromIdx,1);
          const tgtIdx=S.rows.findIndex(r=>r.id===tgtId);
          if(tgtIdx!==-1){
            const to=pos==='above'?tgtIdx:tgtIdx+1;
            row.groupId=S.rows[Math.min(tgtIdx,S.rows.length-1)]?.groupId??null;
            S.rows.splice(to,0,row);
            save();
          } else {
            S.rows.splice(fromIdx,0,row);
          }
        }
      }
    }
  }
  _drgId=null;_drgRowTgt=null;
  render();
}

// ── Group drag reorder ────────────────────────────────────
let _drgGid=null,_drgGTgt=null;
function startDragGroup(e,gid){
  _drgGid=gid;
  document.addEventListener("mousemove",moveDragGroup);
  document.addEventListener("mouseup",endDragGroup);
  document.addEventListener("touchmove",moveDragGroupT,{passive:false});
  document.addEventListener("touchend",endDragGroup);
  document.querySelectorAll(".ghdr").forEach(g=>{
    if(parseInt(g.dataset.gid)===gid) g.classList.add("dragging");
  });
  e.preventDefault();
}
function moveDragGroup(e){_updateGroupDrag(e.clientY);}
function moveDragGroupT(e){_updateGroupDrag(e.touches[0].clientY);e.preventDefault();}
function _updateGroupDrag(cy){
  const ghdrs=[...document.querySelectorAll(".ghdr")];
  ghdrs.forEach(g=>g.classList.remove("drag-above","drag-below"));
  let tgtIdx=ghdrs.length,tgtPos='below';
  for(let i=0;i<ghdrs.length;i++){
    const r=ghdrs[i].getBoundingClientRect();
    if(cy<r.top+r.height/2){tgtIdx=i;tgtPos='above';break;}
    tgtIdx=i;tgtPos='below';
  }
  _drgGTgt={idx:tgtIdx,pos:tgtPos};
  if(tgtIdx<ghdrs.length){
    ghdrs[tgtIdx].classList.add(tgtPos==='above'?"drag-above":"drag-below");
  } else if(ghdrs.length){
    ghdrs[ghdrs.length-1].classList.add("drag-below");
  }
}
function endDragGroup(){
  document.removeEventListener("mousemove",moveDragGroup);
  document.removeEventListener("mouseup",endDragGroup);
  document.removeEventListener("touchmove",moveDragGroupT);
  document.removeEventListener("touchend",endDragGroup);
  document.querySelectorAll(".ghdr").forEach(g=>g.classList.remove("dragging","drag-above","drag-below"));
  if(_drgGid!==null && _drgGTgt!==null){
    const from=S.groups.findIndex(g=>g.id===_drgGid);
    let to=_drgGTgt.pos==='above'?_drgGTgt.idx:_drgGTgt.idx+1;
    if(to>from) to--;
    if(from!==-1 && from!==to){
      const [grp]=S.groups.splice(from,1);
      S.groups.splice(to,0,grp);
      save();
    }
  }
  _drgGid=null;_drgGTgt=null;
  render();
}

// ── Label column resize ───────────────────────────────────
let _resizing=false,_rx=0,_rLW=0,_rafPending=false;
function startResize(e){
  _resizing=true;_rx=e.clientX;_rLW=LW;
  e.currentTarget.classList.add("active");
  document.addEventListener("mousemove",doResize);
  document.addEventListener("mouseup",stopResize);
  e.preventDefault();
}
function startResizeTouch(e){
  _resizing=true;_rx=e.touches[0].clientX;_rLW=LW;
  document.addEventListener("touchmove",doResizeTouch,{passive:false});
  document.addEventListener("touchend",stopResize);
  e.preventDefault();
}
function doResize(e){if(!_resizing)return;applyResize(e.clientX);}
function doResizeTouch(e){if(!_resizing)return;applyResize(e.touches[0].clientX);e.preventDefault();}
function applyResize(clientX){
  LW=Math.max(50,_rLW+(clientX-_rx));
  if(!_rafPending){
    _rafPending=true;
    requestAnimationFrame(()=>{
      _rafPending=false;
      const gw=document.getElementById("gwrap");
      const sx=gw.scrollLeft;
      render();
      requestAnimationFrame(()=>{ gw.scrollLeft=sx; });
    });
  }
}
function stopResize(){
  _resizing=false;
  document.querySelectorAll(".resizer").forEach(r=>r.classList.remove("active"));
  document.removeEventListener("mousemove",doResize);
  document.removeEventListener("mouseup",stopResize);
  document.removeEventListener("touchmove",doResizeTouch);
  document.removeEventListener("touchend",stopResize);
}

});
